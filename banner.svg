<svg width="820" height="200" viewBox="0 0 820 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cyanGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="pinkGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="greenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020010"/>
      <stop offset="50%" style="stop-color:#050020"/>
      <stop offset="100%" style="stop-color:#010015"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#00ffff;stop-opacity:0.8"/>
      <stop offset="80%" style="stop-color:#ff00ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="820" height="200" fill="url(#bgGrad)"/>

  <!-- Scan line overlay -->
  <rect width="820" height="200" fill="url(#scanlines)" opacity="0.04"/>

  <!-- Grid — horizontal -->
  <g stroke="#00ffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="20" x2="820" y2="20"/>
    <line x1="0" y1="40" x2="820" y2="40"/>
    <line x1="0" y1="60" x2="820" y2="60"/>
    <line x1="0" y1="80" x2="820" y2="80"/>
    <line x1="0" y1="100" x2="820" y2="100"/>
    <line x1="0" y1="120" x2="820" y2="120"/>
    <line x1="0" y1="140" x2="820" y2="140"/>
    <line x1="0" y1="160" x2="820" y2="160"/>
    <line x1="0" y1="180" x2="820" y2="180"/>
  </g>
  <!-- Grid — vertical -->
  <g stroke="#00ffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="82"  y1="0" x2="82"  y2="200"/>
    <line x1="164" y1="0" x2="164" y2="200"/>
    <line x1="246" y1="0" x2="246" y2="200"/>
    <line x1="328" y1="0" x2="328" y2="200"/>
    <line x1="410" y1="0" x2="410" y2="200"/>
    <line x1="492" y1="0" x2="492" y2="200"/>
    <line x1="574" y1="0" x2="574" y2="200"/>
    <line x1="656" y1="0" x2="656" y2="200"/>
    <line x1="738" y1="0" x2="738" y2="200"/>
  </g>

  <!-- Top/bottom accent lines (gradient) -->
  <line x1="0" y1="6"   x2="820" y2="6"   stroke="url(#accentLine)" stroke-width="1.5"/>
  <line x1="0" y1="194" x2="820" y2="194" stroke="url(#accentLine)" stroke-width="1.5"/>

  <!-- Left circuit panel -->
  <g stroke="#00ff9f" stroke-opacity="0.75" stroke-width="1.5" fill="none">
    <polyline points="18,45 48,45 65,62 65,138 48,155 18,155"/>
    <circle cx="18" cy="45"  r="2.5" fill="#00ff9f" opacity="0.9"/>
    <circle cx="18" cy="155" r="2.5" fill="#00ff9f" opacity="0.9"/>
    <circle cx="48" cy="100" r="2"   fill="#00ff9f" opacity="0.5"/>
    <line x1="18" y1="100" x2="55" y2="100" stroke-opacity="0.3"/>
    <line x1="30" y1="45"  x2="30" y2="155" stroke-opacity="0.15"/>
  </g>

  <!-- Right circuit panel -->
  <g stroke="#ff00ff" stroke-opacity="0.75" stroke-width="1.5" fill="none">
    <polyline points="802,45 772,45 755,62 755,138 772,155 802,155"/>
    <circle cx="802" cy="45"  r="2.5" fill="#ff00ff" opacity="0.9"/>
    <circle cx="802" cy="155" r="2.5" fill="#ff00ff" opacity="0.9"/>
    <circle cx="772" cy="100" r="2"   fill="#ff00ff" opacity="0.5"/>
    <line x1="802" y1="100" x2="765" y2="100" stroke-opacity="0.3"/>
    <line x1="790" y1="45"  x2="790" y2="155" stroke-opacity="0.15"/>
  </g>

  <!-- Corner brackets -->
  <g stroke="#00ffff" stroke-opacity="0.6" stroke-width="2" fill="none">
    <polyline points="0,0 32,0"/>
    <polyline points="0,0 0,28"/>
    <polyline points="820,0 788,0"/>
    <polyline points="820,0 820,28"/>
    <polyline points="0,200 32,200"/>
    <polyline points="0,200 0,172"/>
    <polyline points="820,200 788,200"/>
    <polyline points="820,200 820,172"/>
  </g>

  <!-- Glitch bar (thin) -->
  <rect x="0" y="92" width="820" height="1" fill="#00ffff" opacity="0.08"/>

  <!-- ▌ blinking cursor effect left of name -->
  <text x="192" y="88"
        font-family="'Courier New', Courier, monospace"
        font-size="32"
        fill="#00ffff"
        opacity="0.5"
        filter="url(#cyanGlow)">▌</text>

  <!-- Main name -->
  <text x="415" y="88"
        font-family="'Courier New', Courier, monospace"
        font-size="34"
        font-weight="bold"
        text-anchor="middle"
        fill="#00ffff"
        filter="url(#cyanGlow)"
        letter-spacing="5">
    JUAN CAMILO SILVA
  </text>

  <!-- Faint "glitch" shadow offset -->
  <text x="416.5" y="89.5"
        font-family="'Courier New', Courier, monospace"
        font-size="34"
        font-weight="bold"
        text-anchor="middle"
        fill="#ff00ff"
        opacity="0.15"
        letter-spacing="5">
    JUAN CAMILO SILVA
  </text>

  <!-- Divider line under name -->
  <line x1="160" y1="100" x2="660" y2="100" stroke="#00ffff" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Role subtitle -->
  <text x="415" y="125"
        font-family="'Courier New', Courier, monospace"
        font-size="13"
        text-anchor="middle"
        fill="#ff00ff"
        filter="url(#pinkGlow)"
        letter-spacing="7">
    DATA SCIENTIST  //  FINANCIAL SYSTEMS
  </text>

  <!-- Tag line -->
  <text x="415" y="158"
        font-family="'Courier New', Courier, monospace"
        font-size="10.5"
        text-anchor="middle"
        fill="#00ff9f"
        filter="url(#greenGlow)"
        opacity="0.85"
        letter-spacing="2.5">
    &gt; BOGOTÁ, COL  ·  MACHINE LEARNING  ·  FRAUD DETECTION  ·  CREDIT RISK
  </text>

  <!-- Tiny status indicator -->
  <circle cx="266" cy="173" r="3.5" fill="#00ff9f" opacity="0.9" filter="url(#greenGlow)"/>
  <text x="276" y="177"
        font-family="'Courier New', Courier, monospace"
        font-size="9"
        fill="#00ff9f"
        opacity="0.7"
        letter-spacing="1.5">
    ONLINE // BUILDING PORTFOLIO 2026
  </text>
</svg>
